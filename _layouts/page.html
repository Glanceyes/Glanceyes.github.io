---
layout: default
---

<section class="page-hero">
  <div class="page-hero-bg" style="background-image: url({{ page.featured_image | relative_url }});"></div>
  <div class="page-hero-inner">
    <div class="page-hero-title">{{ page.title }}</div>
    {% if page.subtitle %}<div class="page-hero-subtitle">{{ page.subtitle }}</div>{% endif %}
  </div>
</section>

<main class="main">
  {{ content }}
</main>
