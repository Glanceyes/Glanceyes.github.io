<nav class="nav">
  <div class="nav-inner">
    <a href="{{ '/' | relative_url }}" class="nav-logo">Glanceyes</a>
    <button class="nav-toggle" type="button" aria-controls="nav-menu" aria-expanded="false" aria-label="Toggle navigation menu">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>
    <ul class="nav-links" id="nav-menu">
      <li><a href="{{ '/' | relative_url }}"{% if page.url == "/" or page.url == "/index" %} class="active"{% endif %}>About</a></li>
      <li><a href="{{ '/publications' | relative_url }}"{% if page.url contains "publications" %} class="active"{% endif %}>Publications</a></li>
      <li><a href="{{ '/projects' | relative_url }}"{% if page.url contains "project" %} class="active"{% endif %}>Projects</a></li>
      <li><a href="{{ '/archives' | relative_url }}"{% if page.url contains "archive" %} class="active"{% endif %}>Archives</a></li>
    </ul>
  </div>
</nav>
<script>
  (function () {
    var btn = document.querySelector('.nav-toggle');
    var menu = document.getElementById('nav-menu');
    if (!btn || !menu) return;
    btn.addEventListener('click', function () {
      var open = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!open));
      menu.classList.toggle('open', !open);
    });
    menu.addEventListener('click', function (e) {
      if (e.target.tagName === 'A') {
        btn.setAttribute('aria-expanded', 'false');
        menu.classList.remove('open');
      }
    });
  })();

  // soft light that eases (lags) toward the cursor over the top nav
  (function () {
    var nav = document.querySelector('.nav');
    if (!nav || !window.matchMedia || !window.matchMedia('(hover: hover)').matches) return;
    var tx = 0, ty = 0, cx = 0, cy = 0, raf = null, active = false;
    function loop() {
      cx += (tx - cx) * 0.16;
      cy += (ty - cy) * 0.16;
      nav.style.setProperty('--nav-cx', cx.toFixed(1) + 'px');
      nav.style.setProperty('--nav-cy', cy.toFixed(1) + 'px');
      if (active || Math.abs(tx - cx) > 0.4 || Math.abs(ty - cy) > 0.4) {
        raf = requestAnimationFrame(loop);
      } else { raf = null; }
    }
    nav.addEventListener('mousemove', function (e) {
      var r = nav.getBoundingClientRect();
      tx = e.clientX - r.left; ty = e.clientY - r.top;
      active = true;
      if (!raf) raf = requestAnimationFrame(loop);
    });
    nav.addEventListener('mouseleave', function () { active = false; });
  })();
</script>
